name: Deploy SaaS Project | CICD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cd backend
          cat > .env << EOF
          PORT= 5000
          MONGO_URL=${{ secrets.MONGO_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ESEWA_PRODUCT_CODE=${{ secrets.ESEWA_PRODUCT_CODE }}
          ESEWA_SECRET_KEY=${{ secrets.ESEWA_SECRET_KEY }}
          EOF

      - name: Stop Existing Containers
        run: docker compose -f docker-compose.prod.yml down || true

      - name: Clean Docker
        run: docker system prune -af

      - name: Build Images
        run: docker compose -f docker-compose.prod.yml build --no-cache

      - name: Start Containers
        run: docker compose -f docker-compose.prod.yml up -d

      - name: Verify Deployment
        run: |
          sleep 10
          docker compose -f docker-compose.prod.yml ps
          docker compose -f docker-compose.prod.yml logs backend --tail=50