services:
  frontend:
    container_name: saas-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - saas-network

  backend:
    container_name: saas-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    networks:
      - saas-network

volumes:
  mongo-data:

networks:
  saas-network:
    driver: bridge